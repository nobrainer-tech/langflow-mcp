name: Langflow API Watch

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: langflow-api-watch
  cancel-in-progress: false

jobs:
  check:
    name: Check latest Langflow API version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      supported_version: ${{ steps.check.outputs.supported_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}
      has_update: ${{ steps.check.outputs.has_update }}
      upgrade_branch: ${{ steps.check.outputs.upgrade_branch }}
      pr_already_open: ${{ steps.check.outputs.pr_already_open }}
      base_branch: ${{ steps.check.outputs.base_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Check release
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: master
        run: node .github/scripts/check-langflow-release.mjs

  notify-and-open-pr:
    name: Open upgrade PR and notify
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.has_update == 'true' && needs.check.outputs.pr_already_open != 'true'
    permissions:
      contents: write
      pull-requests: write
    env:
      SUPPORTED_VERSION: ${{ needs.check.outputs.supported_version }}
      LATEST_VERSION: ${{ needs.check.outputs.latest_version }}
      UPGRADE_BRANCH: ${{ needs.check.outputs.upgrade_branch }}
      BASE_BRANCH: ${{ needs.check.outputs.base_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create upgrade kickoff artifact
        run: |
          dir=".github/langflow-upgrades"
          file="${dir}/langflow-api-v${LATEST_VERSION}.md"
          mkdir -p "${dir}"
          cat > "${file}" <<EOF
          # Langflow API upgrade v${LATEST_VERSION}

          Generated by weekly RA watch on $(date -u +%Y-%m-%dT%H:%M:%SZ).

          ## Context
          - Currently supported API version: ${SUPPORTED_VERSION}
          - Latest detected API version: ${LATEST_VERSION}

          ## Implementation checklist
          - [ ] Review Langflow API changelog and breaking changes
          - [ ] Update API compatibility layer in src/
          - [ ] Add or update contract tests for changed endpoints
          - [ ] Validate run + knowledge base flows against target version
          - [ ] Update README API compatibility section
          - [ ] Run typecheck, tests, and build
          EOF

      - name: Create draft upgrade PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ env.UPGRADE_BRANCH }}
          commit-message: 'chore: start Langflow API v${{ env.LATEST_VERSION }} upgrade'
          title: 'chore: start Langflow API v${{ env.LATEST_VERSION }} upgrade'
          body: |
            ## RA weekly Langflow API watch

            This draft PR was created automatically because a newer Langflow API version was detected.

            - Supported in repo: `${{ env.SUPPORTED_VERSION }}`
            - Latest available: `${{ env.LATEST_VERSION }}`

            Start implementation from:
            - `.github/langflow-upgrades/langflow-api-v${{ env.LATEST_VERSION }}.md`
          base: ${{ env.BASE_BRANCH }}
          add-paths: |
            .github/langflow-upgrades/langflow-api-v${{ env.LATEST_VERSION }}.md
          draft: true
          labels: |
            dependencies
            langflow

      - name: Send SMS alert
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
        run: |
          missing=0
          for secret_name in TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_FROM_NUMBER TWILIO_TO_NUMBER; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            echo "Skipping SMS alert because Twilio secrets are incomplete."
            exit 0
          fi

          body="langflow-mcp: new Langflow API ${LATEST_VERSION} detected (supported: ${SUPPORTED_VERSION}). Draft PR branch: ${UPGRADE_BRANCH}"
          curl --fail --silent --show-error \
            -u "${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}" \
            -X POST "https://api.twilio.com/2010-04-01/Accounts/${TWILIO_ACCOUNT_SID}/Messages.json" \
            --data-urlencode "From=${TWILIO_FROM_NUMBER}" \
            --data-urlencode "To=${TWILIO_TO_NUMBER}" \
            --data-urlencode "Body=${body}"
        continue-on-error: true

      - name: Notify Paperclip webhook
        env:
          PAPERCLIP_RA_WEBHOOK_URL: ${{ secrets.PAPERCLIP_RA_WEBHOOK_URL }}
        run: |
          if [ -z "${PAPERCLIP_RA_WEBHOOK_URL}" ]; then
            echo "PAPERCLIP_RA_WEBHOOK_URL is not set, skipping Paperclip webhook notification."
            exit 0
          fi

          payload=$(cat <<EOF
          {"source":"langflow-mcp","event":"langflow_api_update_detected","supported_version":"${SUPPORTED_VERSION}","latest_version":"${LATEST_VERSION}","upgrade_branch":"${UPGRADE_BRANCH}"}
          EOF
          )
          curl --fail --silent --show-error \
            -H "Content-Type: application/json" \
            -X POST "${PAPERCLIP_RA_WEBHOOK_URL}" \
            -d "${payload}"
        continue-on-error: true
