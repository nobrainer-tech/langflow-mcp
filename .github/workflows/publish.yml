name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm (trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build project
        run: npm run build

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Changes in v${{ steps.get_version.outputs.VERSION }}

            Published to npm: https://www.npmjs.com/package/langflow-mcp-server/v/${{ steps.get_version.outputs.VERSION }}

            Install: \`npm install -g langflow-mcp-server@${{ steps.get_version.outputs.VERSION }}\`
          draft: false
          prerelease: false
          generate_release_notes: true
